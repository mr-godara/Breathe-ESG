services:
  - type: web
    name: esg-platform-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c backend/gunicorn.conf.py backend.config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.config.settings.production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "esg-platform-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: esg-platform-db
          property: connectionString
    autoDeploy: true

databases:
  - name: esg-platform-db
    plan: free
